<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Risk Assessment – Form</title>
    <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&
  family=DM+Serif+Display&family=Poppins:wght@400;600;700&display=swap"         
    rel="stylesheet"
  />    
    <link rel="stylesheet" href="nosa.css" />
     <script src="./frameworks.js"></script> 
    <script src="./nosa-new.js" defer></script>
  </head>
  <body>
    <div class="top-bar">
      <h1>Risk Assessment</h1>
      <span class="progress-pill" id="progressPill">Step 1 of 2</span>
    </div>

    <div class="page-wrap">
      <!-- ── Assessment Info Card ── -->
      <div class="card">
        <div class="card-title">Assessment Details</div>

        <div class="field">
          <label>Assessment Title <span class="req">*</span></label>
          <input
            type="text"
            id="assessmentTitle"
            placeholder="e.g. Phishing Risk Assessment"
          />
          <div class="err-msg" id="err-title">
            Please enter an assessment title.
          </div>
        </div>

        <div class="field">
          <label>Company <span class="req">*</span></label>
          <input type="text" id="companyName" placeholder="e.g. MMU" />
          <div class="err-msg" id="err-company">
            Please enter a company name.
          </div>
        </div>

        <div class="field">
          <label>Assessment Carried Out By <span class="req">*</span></label>
          <input type="text" id="assessorName" placeholder="Full name" />
          <div class="err-msg" id="err-assessor">
            Please enter the assessor's name.
          </div>
        </div>

        <div class="field">
          <label>Date Assessment Carried Out <span class="req">*</span></label>
          <input type="date" id="assessmentDate" />
          <div class="err-msg" id="err-date">Please select a date.</div>
        </div>

        <div class="field">
          <label>Date of Next Review <span class="req">*</span></label>
          <input type="date" id="reviewDate" />
          <div class="err-msg" id="err-review">
            Please select a review date.
          </div>
        </div>
      </div>

      <!-- ── Threats Section ── -->
      <div id="threatsContainer"></div>

      <button class="add-threat-btn" onclick="addThreat()">
        <span style="font-size: 1.3rem">＋</span> Add a New Threat
      </button>

      <div class="warn-box" id="warnBox" style="display: none">
        You can
        <a
          href="#"
          onclick="
            addThreat();
            return false;
          "
          >add another threat</a
        >
        or save and close this Risk Assessment.
      </div>
    </div>

    <!-- ── Sticky Action Bar ── -->
    <div class="action-bar">
      <button class="btn btn-outline" onclick="saveDraft()">Save</button>
      <button class="btn btn-primary" onclick="submitForm()">
        Save &amp; Continue →
      </button>
    </div>
  </body>
</html>
