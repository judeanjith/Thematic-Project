<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page title shown in browser tab -->
    <title>Login</title>

    <!-- Link to external stylesheet -->
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="style-2.css">
    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }
            
            // Get registered users from localStorage
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                // Store current user session
                localStorage.setItem('currentUser', JSON.stringify(user));
                showMessage('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'nosa.html';
                }, 1500);
            } else {
                showMessage('Invalid username or password', 'error');
            }
        }
        
        function showMessage(message, type) {
            // Remove existing message
            const existingMsg = document.querySelector('.auth-message');
            if (existingMsg) existingMsg.remove();
            
            // Create new message
            const msgDiv = document.createElement('div');
            msgDiv.className = `auth-message ${type}`;
            msgDiv.textContent = message;
            
            // Insert before the form
            const form = document.querySelector('.auth-box');
            form.parentNode.insertBefore(msgDiv, form);
            
            // Auto-hide error messages after 5 seconds
            if (type === 'error') {
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                }, 5000);
            }
        }
        
        // Add form submission handler when page loads
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.auth-box').addEventListener('submit', handleLogin);
        });
    </script>
</head>
<body>
<header class="box1">
    <div class="header-content">
        <a href="Home.html" class="title">Cyber Risk Assessment</a>
        <div class="dropdown">
            <button class="dropbtn">Menu ☰</button>
            <div class="dropdown-content">
                <a href="Home.html">Home</a>
                <a href="login-2.html">Login</a>
                <a href="register-2.html">Register</a>
                <a href="nosa.html">Risk Assessment Tool</a>
            </div>
        </div>
    </div>
</header>

    <!-- Main container used to center the login box -->
    <div class="auth-container">

        <!-- Login form (will connect to backend later) -->
        <form class="auth-box">

            <!-- Page heading -->
            <h2>Login</h2>

            <!-- Username input -->
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                required
            >

            <!-- Password input -->
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                required
            >

            <!-- Submit button -->
            <button type="submit">Login</button>

            <!-- Link to registration page -->
            <p class="switch">
                Don't have an account?
                <a href="register-2.html">Register</a>
            </p>

        </form>
    </div>

</body>
</html>
