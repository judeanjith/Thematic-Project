<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Register</title>

    <!-- Link to shared stylesheet -->
    <link rel="stylesheet" href="homepage/Style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="box1">
    <div class="header-content">
        <a href="RiskAssessmentWebsite.html" class="title">Cyber Risk Assessment</a>
        <div class="dropdown">
            <button class="dropbtn">Menu ☰</button>
            <div class="dropdown-content">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="Nosa/index.html">Risk Assessment Tool</a>
            </div>
        </div>
    </div>
</header>

    <!-- Container that centers the register box -->
    <div class="auth-container">

        <!-- Registration form -->
        <form class="auth-box" action="/register" method="POST">

            <!-- Form heading -->
            <h2>Create Account</h2>

            <!-- Username field -->
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                required
            >

            <!-- Email field -->
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required
            >

            <!-- Password field -->
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                required
            >

            <!-- Role selection (dropdown menu) -->
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="Viewer">Viewer</option>
                <option value="Assessor">Assessor</option>
            </select>

            <!-- Submit button -->
            <button type="submit">Register</button>

            <!-- Link back to login page -->
            <p class="switch">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </form>
    </div>

</body>
</html>
