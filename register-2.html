<!-- register.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Page title -->
    <title>Register</title>

    <!-- Link to shared stylesheet -->
    <link rel="stylesheet" href="Home.css">
    <link rel="stylesheet" href="style-2.css">
    <script>
        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            if (!username || !email || !password) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }
            
            // Get existing users
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            
            // Check if username already exists
            if (users.some(u => u.username === username)) {
                showMessage('Username already exists. Please choose a different one.', 'error');
                return;
            }
            
            // Check if email already exists
            if (users.some(u => u.email === email)) {
                showMessage('Email already registered. Please use a different email.', 'error');
                return;
            }
            
            // Create new user
            const newUser = {
                username: username,
                email: email,
                password: password,
                role: role,
                registeredAt: new Date().toISOString()
            };
            
            // Save user
            users.push(newUser);
            localStorage.setItem('registeredUsers', JSON.stringify(users));
            
            showMessage('Registration successful! You can now login.', 'success');
            
            // Clear form
            document.getElementById('username').value = '';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('role').value = 'Viewer';
            
            // Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = 'login-2.html';
            }, 2000);
        }
        
        function showMessage(message, type) {
            // Remove existing message
            const existingMsg = document.querySelector('.auth-message');
            if (existingMsg) existingMsg.remove();
            
            // Create new message
            const msgDiv = document.createElement('div');
            msgDiv.className = `auth-message ${type}`;
            msgDiv.textContent = message;
            
            // Insert before the form
            const form = document.querySelector('.auth-box');
            form.parentNode.insertBefore(msgDiv, form);
            
            // Auto-hide error messages after 5 seconds
            if (type === 'error') {
                setTimeout(() => {
                    if (msgDiv.parentNode) msgDiv.remove();
                }, 5000);
            }
        }
        
        // Add form submission handler when page loads
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.auth-box').addEventListener('submit', handleRegister);
        });
    </script>
</head>
<body>
<header class="box1">
    <div class="header-content">
        <a href="Home.html" class="title">Cyber Risk Assessment</a>
        <div class="dropdown">
            <button class="dropbtn">Menu ☰</button>
            <div class="dropdown-content">
                <a href="Home.html">Home</a>
                <a href="login-2.html">Login</a>
                <a href="register-2.html">Register</a>
                <a href="nosa.html">Risk Assessment Tool</a>
            </div>
        </div>
    </div>
</header>

    <!-- Container that centers the register box -->
    <div class="auth-container">

        <!-- Registration form -->
        <form class="auth-box">

            <!-- Form heading -->
            <h2>Create Account</h2>

            <!-- Username field -->
            <label for="username">Username</label>
            <input 
                type="text" 
                id="username" 
                name="username" 
                required
            >

            <!-- Email field -->
            <label for="email">Email</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required
            >

            <!-- Password field -->
            <label for="password">Password</label>
            <input 
                type="password" 
                id="password" 
                name="password" 
                required
            >

            <!-- Role selection (dropdown menu) -->
            <label for="role">Role</label>
            <select id="role" name="role">
                <option value="Viewer">Viewer</option>
                <option value="Assessor">Assessor</option>
            </select>

            <!-- Submit button -->
            <button type="submit">Register</button>

            <!-- Link back to login page -->
            <p class="switch">
                Already have an account?
                <a href="login-2.html">Login</a>
            </p>

        </form>
    </div>

</body>
</html>
